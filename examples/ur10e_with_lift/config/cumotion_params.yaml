# cuMotion parameters for UR10e + Lift (7-DOF).
#
# 7-DOF planning is ~1.5-2x slower than 6-DOF because cspace is larger.
# Use higher budgets here vs the plain UR10e example.

/**:
  ros__parameters:
    robot: ""
    urdf_path: ""
    tool_frame: "tool0"

    time_dilation_factor: 1.0
    interpolation_dt: 0.025

    # Lift motions can add several seconds — bump max_dt well above default.
    maximum_trajectory_dt: 0.5

    # 7-DOF needs more time
    curobo_timeout: 15.0
    max_attempts: 30

    num_graph_seeds: 64
    num_trajopt_seeds: 32
    # 48 timesteps (vs 32 in 6-DOF) for finer resolution on long motions.
    num_trajopt_time_steps: 48
    trajopt_finetune_iters: 400
    include_trajopt_retract_seed: false

    joint_states_topic: "/joint_states"

    collision_checker_type: "PRIMITIVE"
    read_esdf_world: false
    add_ground_plane: false
    publish_curobo_world_as_voxels: false

    collision_cache_cuboid: 20
    collision_cache_mesh: 20

    enable_curobo_debug_mode: false
    override_moveit_scaling_factors: true
    update_link_sphere_server: "planner_attach_object"
